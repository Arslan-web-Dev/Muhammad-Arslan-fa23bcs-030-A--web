<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD MySQL Example</title>
    <!-- Bootstrap 5 CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeo5F84A+0U6FM/nhUObKZ4Y5nY5P4ujgGVR0YFFb5e6Sqlg"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="p-4">
    <div class="container">
        <h1 class="mb-4">User Management</h1>

        <!-- info for users -->
        <p class="text-muted">
            Fill the form and click <strong>Add User</strong> to create a record.  
            Once a user is added the table below will list all entries.  
            Each row has <strong>Edit</strong> and <strong>Delete</strong> buttons.  
            When editing a record the Add button becomes <strong>Update User</strong>
            and a <strong>Cancel</strong> button appears.
        </p>

        <button id="loadBtn" class="btn btn-info mb-3">Load Users</button>

        <!-- user form -->
        <form id="userForm" class="mb-4">
            <input type="hidden" id="userId" />
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input
                    type="text"
                    class="form-control"
                    id="name"
                    required
                />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    required
                />
            </div>
            <div class="mb-3">
                <label for="age" class="form-label">Age</label>
                <input
                    type="number"
                    class="form-control"
                    id="age"
                    min="0"
                    required
                />
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">
                Add User
            </button>
            <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">
                Cancel
            </button>
        </form>

        <!-- user table -->
        <table class="table table-striped" id="usersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
