<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Muhammad Arslan | BSCS Portfolio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#259df4",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101a22",
                        "surface": "#1a2733"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "heading": ["Outfit", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-300">
    <!-- Animation Layers -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="cursor-follower" id="cursor"></div>

    <div class="relative min-h-screen w-full flex flex-col particle-bg">
        <header
            class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-3xl">terminal</span>
                        <span class="text-xl font-bold tracking-tight font-heading">Muhammad<span
                                class="text-primary">Arslan</span></span>
                    </div>
                    <div class="flex items-center gap-3 md:flex-row">
                        <nav class="hidden md:flex items-center gap-8 mr-4">
                            <a class="text-sm font-medium hover:text-primary transition-colors"
                                href="index.html#about">About</a>
                            <a class="text-sm font-medium hover:text-primary transition-colors"
                                href="skills.html">Skills</a>
                            <a class="text-sm font-medium hover:text-primary transition-colors"
                                href="projects.html">Projects</a>
                            <a class="text-sm font-medium hover:text-primary transition-colors"
                                href="blog.html">Blog</a>
                            <a class="text-sm font-medium hover:text-primary transition-colors"
                                href="contact.html">Contact</a>
                        </nav>
                        <button id="theme-toggle"
                            class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:bg-primary/20 transition-colors">
                            <span class="material-symbols-outlined text-xl">dark_mode</span>
                        </button>
                        <a href="login.html"
                            class="hidden sm:flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all">
                            Admin Console
                        </a>
                        <button id="mobile-menu-toggle"
                            class="md:hidden p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:bg-primary/20 transition-colors">
                            <span class="material-symbols-outlined text-xl">menu</span>
                        </button>
                    </div>
                </div>
                <!-- Mobile Menu -->
                <div id="mobile-menu" class="hidden md:hidden pb-4 flex flex-col gap-4">
                    <div class="flex flex-col gap-4 border-t border-slate-200 dark:border-slate-800 pt-4">
                        <a class="text-sm font-medium hover:text-primary transition-colors" href="#about">About</a>
                        <a class="text-sm font-medium hover:text-primary transition-colors" href="#skills">Skills</a>
                        <a class="text-sm font-medium hover:text-primary transition-colors"
                            href="#projects">Projects</a>
                        <a class="text-sm font-medium hover:text-primary transition-colors" href="#blog">Blog</a>
                        <a class="text-sm font-medium hover:text-primary transition-colors" href="#contact">Contact</a>
                        <a href="login.html"
                            class="flex sm:hidden w-fit items-center gap-2 bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all mt-2">
                            Admin Console
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow">
            <main class="flex-grow">
<!-- Skills Section -->
            <section class="py-20" id="skills">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <h2 class="text-4xl font-black mb-12 flex items-center justify-between font-heading reveal">
                        <span class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">psychology</span> Technical Expertise
                        </span>
                        <button
                            class="admin-only hidden items-center gap-2 bg-primary/10 hover:bg-primary/20 text-primary border border-primary/20 px-4 py-2 rounded-xl text-sm font-bold transition-all"
                            onclick="openSkillModal()">
                            <span class="material-symbols-outlined text-sm">add</span> Add Skill
                        </button>
                    </h2>
                    <div id="skills-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </section>

            </main>

        <footer class="bg-slate-950 border-t border-slate-900 py-16">
            <div
                class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-12">
                <div class="text-center md:text-left">
                    <div class="flex items-center justify-center md:justify-start gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary text-3xl">terminal</span>
                        <span class="text-xl font-bold font-heading uppercase tracking-widest">Muhammad<span
                                class="text-primary">Arslan</span></span>
                    </div>
                    <p class="text-sm text-slate-500">© 2026 Muhammad Arslan Designed by me </p>
                </div>
                <div class="flex gap-8">
                    <a class="text-slate-500 hover:text-primary transition-all text-sm font-bold uppercase tracking-widest" href="mailto:muhammadarslan.cs.web@gmail.com" title="Email">
                        <i class="bi bi-envelope"></i> Email
                    </a>
                    <a class="text-slate-500 hover:text-primary transition-all text-sm font-bold uppercase tracking-widest" href="https://github.com/fa23-bcs-030-max" target="_blank" rel="noopener" title="GitHub">
                        <i class="bi bi-github"></i> GitHub
                    </a>
                    <a class="text-slate-500 hover:text-primary transition-all text-sm font-bold uppercase tracking-widest" href="https://www.linkedin.com/in/muhammad-arslan-964b2738b/" target="_blank" rel="noopener" title="LinkedIn">
                        <i class="bi bi-linkedin"></i> LinkedIn
                    </a>
                    <a class="text-slate-500 hover:text-primary transition-all text-sm font-bold uppercase tracking-widest" href="https://wa.me/923275541708" target="_blank" rel="noopener" title="WhatsApp">
                        <i class="bi bi-whatsapp"></i> WhatsApp
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Glass Management Modals -->
    <div id="glass-modal-overlay"
        class="fixed inset-0 z-[100] hidden bg-background-dark/80 backdrop-blur-xl flex items-center justify-center p-4 overflow-y-auto">
        <!-- Skill Modal -->
        <div id="skill-modal-content"
            class="hidden w-full max-w-md bg-surface border border-slate-800 rounded-3xl p-8 shadow-2xl reveal">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black font-heading">Add Technical Skill</h3>
                <button onclick="closeModals()" class="text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="skill-form-inline" class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">Skill
                        Name</label>
                    <input
                        class="w-full bg-background-dark/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-700"
                        name="name" placeholder="e.g. Next.js" type="text" required />
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">Expertise
                        Level (%)</label>
                    <input
                        class="w-full bg-background-dark/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-700"
                        name="level" type="number" min="1" max="100" required />
                </div>
                <div>
                    <label
                        class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">Category</label>
                    <input
                        class="w-full bg-background-dark/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-700"
                        name="category" placeholder="Frontend, Backend, etc." type="text" />
                </div>
                <button
                    class="w-full bg-primary text-white font-black py-4 rounded-xl hover:bg-primary/90 transition-all shadow-xl shadow-primary/20 uppercase tracking-widest mt-4"
                    type="submit">Save Skill</button>
            </form>
        </div>

            </div>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
